function fcList(){
  return CARDS.filter(c=>
    (fc.domain==="all" || c.d===fc.domain) &&
    (fc.imp==="all" || impOfCard(c.t)===fc.imp));
}
let cz = {idx:0, open:false};
function clozeList(){ return fc.domain==="all"? CLOZE : CLOZE.filter(x=>x.d===fc.domain); }
function cardModeToggle(){
  return `<div class="modetoggle">
    <button data-cmode="card" aria-pressed="${fc.mode!=="cloze"}">用語カード</button>
    <button data-cmode="cloze" aria-pressed="${fc.mode==="cloze"}">穴埋めドリル</button>
  </div>`;
}
function renderCloze(){
  const list = clozeList();
  if(!list.length) return `<div class="fcwrap">${cardModeToggle()}<div class="card">この領域の穴埋め問題はありません。</div></div>`;
  if(cz.idx >= list.length) cz.idx = 0;
  const c = list[cz.idx];
  const known = S.clz[c.id]===1;
  const knownCount = list.filter(x=>S.clz[x.id]===1).length;
  const qhtml = esc(c.q).replace(/【(\d)】/g, '<span class="blank">$1</span>');
  return `
  <div class="fcwrap">
    ${cardModeToggle()}
    <div class="fcfilter">
      <button data-fd="all" aria-pressed="${fc.domain==="all"}">すべて</button>
      ${Object.entries(DOMAINS).map(([d,n])=>`<button data-fd="${d}" aria-pressed="${fc.domain===d}">${n}</button>`).join("")}
    </div>
    <p class="muted" style="margin:0 0 10px">習得 ${knownCount} / ${list.length} ${known?"（このカードは習得済み✓）":""}　—　空欄を頭の中で埋めてから答えを開く。<b>一言一句のレベル</b>で言えたら「覚えた」。答案の得点は用語の精密さで決まります。</p>
    <div class="fcard" style="cursor:default">
      <div class="clz-q">${qhtml}</div>
      ${cz.open? `<div class="clz-a">${c.a.map((a,i)=>`<div class="row"><b>${i+1}</b><span>${esc(a)}</span></div>`).join("")}</div>`:""}
    </div>
    <div class="fcnav">
      <button class="btn ghost" id="czprev" aria-label="前へ">←</button>
      ${cz.open
        ? `<button class="btn dunno" id="czno">まだ</button><button class="btn know" id="czyes">覚えた</button>`

      <button class="btn ghost" id="cznext" aria-label="次へ">→</button>
      <span class="cnt">${cz.idx+1} / ${list.length}</span>
    </div>
  </div>`;
}
function renderCards(){
  if(fc.mode==="cloze") return renderCloze();
  const list = fcList();
  if(fc.idx >= list.length) fc.idx = 0;
  const c = list[fc.idx];
  const known = c && S.cards[c.t]===1;
  const knownCount = list.filter(x=>S.cards[x.t]===1).length;
  return `
  <div class="fcwrap">
    ${cardModeToggle()}
    <div class="fcfilter">
      <button data-fd="all" aria-pressed="${fc.domain==="all"}">すべて</button>
      ${Object.entries(DOMAINS).map(([d,n])=>`<button data-fd="${d}" aria-pressed="${fc.domain===d}">${n}</button>`).join("")}
    </div>
    <div class="impfilter"><span class="lbl">重要度：</span>
      ${["all","A","B","C"].map(k=>`<button data-cif="${k}" aria-pressed="${fc.imp===k}">${k==="all"?"すべて":k}</button>`).join("")}

    </div>
    <p class="muted" style="margin:0 0 10px">習得 ${knownCount} / ${list.length}　—　${fc.rev? "定義を読んで<b>用語名を正確に言えるか</b>。公式模試の短答（30字）はこの逆想起型です。" : "カードをタップで定義表示。記述式では<b>定義を自分の言葉で正確に書ける</b>ことが得点の土台。周回はランクAから。"}</p>
    ${c? (()=>{
      const termFace = `<div class="term"><span class="imp ${impOfCard(c.t)}" style="margin-right:6px">${impOfCard(c.t)}</span>${esc(c.t)} ${known? "✓":""}</div>`;
      const defFace = `<div class="def">${esc(c.f)}</div>`;
      const front = fc.rev? defFace+`<div class="hint">この定義の用語名は？ タップで答え</div>` : termFace+`<div class="hint">タップして定義を確認</div>`;
      const back  = fc.rev? termFace+`<div class="hint">タップで定義に戻る</div>` : defFace+`<div class="hint">タップで用語に戻る</div>`;
      return `
    <div class="fcard" id="fcard" role="button" tabindex="0" aria-label="カードをめくる">
      ${fc.flip? back : front}
    </div>`;})() : ""}
    ${c? `
    <div class="fcnav">
      <button class="btn ghost" id="fprev" aria-label="前のカード">←</button>
      <button class="btn dunno" id="fno">まだ</button>
      <button class="btn know" id="fyes">覚えた</button>
      <button class="btn ghost" id="fnext" aria-label="次のカード">→</button>
      <span class="cnt">${fc.idx+1} / ${list.length}</span>

      <button class="btn ghost" id="fshuffle">シャッフル</button>
      <button class="btn ghost" id="funknown">「まだ」だけ表示</button>
    </div>`
    : `<div class="card">この領域のカードはありません。</div>`}
  </div>`;
}

    <div class="plnow" style="margin-top:14px">
      <div class="pl-kicker" id="pl-kicker">${item? esc(item.sub):""}</div>
      <div class="pl-title serif" id="pl-title">${item? esc(item.title):"—"}</div>
      <div class="pl-cnt" id="pl-cnt">${AU.list.length? (AU.i+1)+" / "+AU.list.length : "0 / 0"}</div>
      <div class="plctrl">
        <button class="plbtn" id="pl-prev" aria-label="前へ">⏮</button>
        <button class="plbtn main" id="pl-toggle" aria-label="再生・停止">${AU.playing? "⏸":"▶"}</button>
        <button class="plbtn" id="pl-next" aria-label="次へ">⏭</button>
      </div>
      <div class="plopts">
        <button id="pl-rate">速度 ${AU.rate.toFixed(2).replace(/0$/,"")}x</button>
        <button id="pl-loop" aria-pressed="${AU.loop}">ループ</button>
        ${AU.src==="cards"? `<button id="pl-quiz" aria-pressed="${AU.quiz}">想起モード（間をあける）</button>`:""}
      </div>
      <div class="pl-text" id="pl-text">${item? esc(item.text):""}</div>
    </div>

    <p class="plnote">📱 <b>使い方のコツ</b>：再生中は他のタブ（用語ドリル等）に移動しても音声は続きます。スマホでは<b>画面を消すと停止する</b>ため、再生中は画面が自動で点灯維持されます（対応端末）。ジムでは画面を伏せずポケットへ。<b>🚗 運転中の操作は絶対にしないでください</b>——乗車前に再生・ループをONにしてから出発を。音声はブラウザ内蔵の合成音声で、通信は不要です。</p>
    <p class="plnote">🎧 <b>おすすめ</b>：①「用語ドリル×想起モード」＝用語を聞いて数秒で定義を思い出す→答え合わせ。②「模範解答×1.25倍速」＝答案の論理展開を耳から刷り込む。重点領域（消費者行動・価格）のフィルタで集中的に。</p>
  </div>`;
}

/* ============================================================
   論点マップ
   ============================================================ */
let tpFilter = "all"; // all | weak(×と△のみ)
function topicStats(){
  const st = {r3:0, r2:0, r1:0, r0:0, total:0};
  TOPICS.forEach((grp,gi)=>grp.items.forEach((_,ii)=>{
    st.total++;
    const v = (S.topics||{})[gi+"-"+ii] || 0;
    if(v===3) st.r3++; else if(v===2) st.r2++; else if(v===1) st.r1++; else st.r0++;
  }));
  return st;
}
function renderTopics(){
  const st = topicStats();
  let html = `
  <p class="muted" style="margin-top:0">出題されうる論点の一覧です。各論点を「<b>骨子まで書けるか</b>」の基準で自己評価してください。上級者の学習効率は<b>穴の特定</b>で決まります。×と△だけを潰していけば、本番で初見の論点に当たる確率を最小化できます。</p>
  <div class="tp-sum">
    <div class="cell"><div class="n" style="color:var(--good)">${st.r3}</div><div class="l">○ 書ける</div></div>
    <div class="cell"><div class="n" style="color:var(--warn)">${st.r2}</div><div class="l">△ 曖昧</div></div>
    <div class="cell"><div class="n" style="color:var(--bad)">${st.r1}</div><div class="l">× 書けない</div></div>
    <div class="cell"><div class="n" style="color:var(--ink2)">${st.r0}</div><div class="l">未評価</div></div>
  </div>
  <div class="impfilter">
    <button data-tf="all" aria-pressed="${tpFilter==="all"}">すべて表示</button>
    <button data-tf="weak" aria-pressed="${tpFilter==="weak"}">×・△・未評価だけ表示</button>
  </div>`;
  TOPICS.forEach((grp,gi)=>{
    const rows = grp.items.map((t,ii)=>{
      const key = gi+"-"+ii;
      const v = (S.topics||{})[key] || 0;
      if(tpFilter==="weak" && v===3) return "";
      return `<div class="tp-row r${v}">
        <span class="nm">${esc(t)}</span>
        <span class="tp-btns">
          <button data-tk="${key}" data-tv="3" class="${v===3?"on3":""}" aria-label="書ける">○</button>
          <button data-tk="${key}" data-tv="2" class="${v===2?"on2":""}" aria-label="曖昧">△</button>
          <button data-tk="${key}" data-tv="1" class="${v===1?"on1":""}" aria-label="書けない">×</button>
        </span>
      </div>`;
    }).join("");
    if(rows.trim()) html += `<h2 class="sec">${grp.g}</h2><div class="card">${rows}</div>`;
  });
  html += `<p class="muted">※ 同じボタンをもう一度押すと評価を解除できます。×の論点はまず用語ドリル・音声学習で該当領域をインプットし、対応する演習があれば解いてください。</p>`;
  return html;
}

/* ============================================================
   直前総まとめシート（ランクA骨子の一覧）
   ============================================================ */
function renderSheet(){
  const essA = ESSAYS.filter(e=>impOfEssay(e.id)==="A");
  const cardA = CARDS.filter(c=>impOfCard(c.t)==="A");
  return `
  <button class="backlink" data-goto="home">← ホームに戻る</button>
  <h2 class="sec">直前総まとめ — ランクA 記述${essA.length}問の骨子</h2>
  <p class="muted" style="margin:0 0 14px">試験前日・当日朝の最終確認用。骨子の流れだけを頭に再生してください。</p>
  <div class="card">
    ${essA.map(e=>`<div class="sheet-item">
      <h4>${esc(e.title.replace("【昨年度型】","").replace("【弱点強化】",""))} <span class="chip">${DOMAINS[e.d]}</span></h4>
      <div class="bd">${esc(e.model.replace("【解答骨子】\n",""))}</div>
    </div>`).join("")}
  </div>
  <h2 class="sec">ランクA 用語${cardA.length}語の定義</h2>
  <div class="card">
    ${cardA.map(c=>`<div class="sheet-item">
      <h4>${esc(c.t)}</h4>
      <div class="bd">${esc(c.f)}</div>
    </div>`).join("")}
  </div>`;
}

/* ============================================================
   イベント
   ============================================================ */
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click", ()=>{ view=b.dataset.v; if(view!=="essay") curEssay=null; render(); });
});

function bindMain(){
  document.querySelectorAll("[data-open]").forEach(b=>{
    b.addEventListener("click", ()=>{ curEssay=b.dataset.open; view="essay"; render(); });
  });
  document.querySelectorAll("[data-goto]").forEach(b=>{
    b.addEventListener("click", ()=>{ view=b.dataset.goto; curEssay=null; render(); });
  });
  const back = $("[data-back]");
  if(back) back.addEventListener("click", ()=>{ curEssay=null; render(); });

  const ans = $("#ansbox");
  if(ans){
    ans.addEventListener("input", ()=>{
      const st = S.essays[curEssay] = S.essays[curEssay]||{};
      st.ans = ans.value; save();
      const cc=$("#cc"); if(cc) cc.textContent = ans.value.length;
    });
  }
  const rev = $("#reveal");
  if(rev) rev.addEventListener("click", ()=>{
    const st = S.essays[curEssay] = S.essays[curEssay]||{};
    st.reveal = true; save(); render();
  });
  document.querySelectorAll("[data-pi]").forEach(ch=>{
    ch.addEventListener("change", ()=>{
      const e = ESSAYS.find(x=>x.id===curEssay);
      const st = S.essays[curEssay] = S.essays[curEssay]||{};
      st.checks = st.checks || e.points.map(()=>false);
      st.checks[+ch.dataset.pi] = ch.checked;
      st.score = st.checks.filter(Boolean).length / e.points.length;
      if(st.mday !== todayKey()){ st.mday = todayKey(); bump("e"); } else { save(); }
      ch.closest(".pt").classList.toggle("on", ch.checked);
      const scv=$("#scv"); if(scv) scv.textContent = st.checks.filter(Boolean).length;
      const scg=$("#scg"); if(scg) scg.textContent = gradeOf(Math.round(st.score*100));
    });
  });

  /* Claude採点プロンプトのコピー */
  const cg = $("#claudegrade");
  if(cg) cg.addEventListener("click", async ()=>{
    const e = ESSAYS.find(x=>x.id===curEssay);
    const st = S.essays[curEssay] || {};
    const prompt = gradePrompt(e, st.ans);
    const ok = await copyText(prompt);
    const m = $("#cgmsg");
    if(ok){
      if(m) m.textContent = "コピーしました。Claudeに貼り付けると、事実誤認・論理の飛躍を含む厳格な採点が受けられます。";
    } else {
      // クリップボードが使えない環境：全文を表示して手動コピーしてもらう
      if(m) m.textContent = "自動コピーできない環境のため、下の全文を長押し（または全選択）してコピーしてください。";
      const box = $("#cgbox");
      if(box){ box.style.display="block"; box.value = prompt; box.focus(); box.select(); }
    }
  });

  /* 模試モード */
  const mst=$("#mockstart"), mfn=$("#mockfin"), mcl=$("#mockclose");
  if(mst) mst.addEventListener("click", mockStart);
  if(mfn) mfn.addEventListener("click", mockFinish);
  if(mcl) mcl.addEventListener("click", ()=>{ delete S.mockResult; save(); render(); });

  /* 重要度フィルタ（記述演習） */
  document.querySelectorAll("[data-if]").forEach(b=>{
    b.addEventListener("click", ()=>{ impFilter=b.dataset.if; render(); });
  });
  /* 重要度フィルタ（用語ドリル） */
  document.querySelectorAll("[data-cif]").forEach(b=>{
    b.addEventListener("click", ()=>{ fc.imp=b.dataset.cif; fc.idx=0; fc.flip=false; render(); });
  });
  /* 逆想起モード（定義→用語） */
  document.querySelectorAll("[data-crev]").forEach(b=>{
    b.addEventListener("click", ()=>{ fc.rev=!fc.rev; fc.flip=false; render(); });
  });
  /* 重要度フィルタ（音声学習） */
  document.querySelectorAll("[data-aimp]").forEach(b=>{
    b.addEventListener("click", ()=>{ AU.imp=b.dataset.aimp; auReset(); render(); });
  });

  /* 周回リセット（2段階確認） */
  const ra=$("#roundask"), rg=$("#roundgo"), rc=$("#roundcancel");
  if(ra) ra.addEventListener("click", ()=>{ roundConfirm=true; render(); });
  if(rc) rc.addEventListener("click", ()=>{ roundConfirm=false; render(); });
  if(rg) rg.addEventListener("click", ()=>{ roundConfirm=false; roundReset(); render(); });

  /* 用語カード／穴埋めモード切替 */
  document.querySelectorAll("[data-cmode]").forEach(b=>{
    b.addEventListener("click", ()=>{ fc.mode=b.dataset.cmode; cz.open=false; render(); });
  });
  /* 穴埋めドリル */
  const czList = clozeList();
  const czMove = dir=>{ cz.idx=(cz.idx+dir+czList.length)%Math.max(czList.length,1); cz.open=false; render(); };
  const czp=$("#czprev"), czn=$("#cznext"), czr=$("#czreveal"), czy=$("#czyes"), czx=$("#czno");
  if(czp) czp.addEventListener("click", ()=>czMove(-1));
  if(czn) czn.addEventListener("click", ()=>czMove(1));
  if(czr) czr.addEventListener("click", ()=>{ cz.open=true; render(); });
  if(czy) czy.addEventListener("click", ()=>{ S.clz[czList[cz.idx].id]=1; bump("c"); czMove(1); });
  if(czx) czx.addEventListener("click", ()=>{ delete S.clz[czList[cz.idx].id]; bump("c"); czMove(1); });

  /* 論点マップ */
  document.querySelectorAll("[data-tf]").forEach(b=>{
    b.addEventListener("click", ()=>{ tpFilter=b.dataset.tf; render(); });
  });
  document.querySelectorAll("[data-tk]").forEach(b=>{
    b.addEventListener("click", ()=>{
      const k=b.dataset.tk, v=+b.dataset.tv;
      S.topics = S.topics || {};
      S.topics[k] = (S.topics[k]===v)? 0 : v; // 同じ評価をもう一度押すと解除
      save(); render();
    });
  });

  /* データ保存・復元 */
  const setMsg = (t, bad)=>{ const m=$("#datamsg"); if(m){ m.textContent=t; m.style.color = bad? "var(--bad)":"var(--good)"; } };
  const ef=$("#expfile"), ec=$("#expclip"), ib=$("#impbtn"), iff=$("#impfile"), ip=$("#imppaste");
  if(ef) ef.addEventListener("click", async ()=>{
    const ok = await exportFile();
    setMsg(ok? "バックアップファイルを保存しました。" : "保存されませんでした。「進捗コードをコピー」もお試しください。", !ok);
  });
  if(ec) ec.addEventListener("click", async ()=>{
    const ok = await exportClipboard();
    if(ok) markBackup();
    setMsg(ok? "進捗コードをコピーしました。メモアプリ等に貼って保管してください。" : "コピーできませんでした。", !ok);
  });
  if(ib && iff){
    ib.addEventListener("click", ()=>iff.click());
    iff.addEventListener("change", ()=>{
      const f = iff.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ()=>{
        if(importText(r.result)){ dataMsg="進捗を復元しました。"; render(); }
        else setMsg("復元できませんでした。ファイルの内容をご確認ください。", true);
      };
      r.readAsText(f);
    });
  }
  if(ip) ip.addEventListener("click", ()=>{
    const box = $("#pastebox");
    if(box && importText(box.value.trim())){ dataMsg="進捗を復元しました。"; render(); }
    else setMsg("復元できませんでした。貼り付けた内容をご確認ください。", true);
  });

  /* 音声学習 */
  document.querySelectorAll("[data-asrc]").forEach(b=>{
    b.addEventListener("click", ()=>{ AU.src=b.dataset.asrc; auReset(); render(); });
  });
  document.querySelectorAll("[data-adom]").forEach(b=>{
    b.addEventListener("click", ()=>{ AU.dom=b.dataset.adom; auReset(); render(); });
  });
  const pt=$("#pl-toggle"), pp=$("#pl-prev"), pn=$("#pl-next"), pr=$("#pl-rate"), pl=$("#pl-loop"), pq=$("#pl-quiz");
  if(pt) pt.addEventListener("click", ()=>{ AU.playing? auStop() : auPlay(); });
  if(pp) pp.addEventListener("click", ()=>auSkip(-1));
  if(pn) pn.addEventListener("click", ()=>auSkip(1));
  if(pr) pr.addEventListener("click", ()=>{
    const rates=[1.0,1.25,1.5,0.8];
    AU.rate = rates[(rates.indexOf(AU.rate)+1) % rates.length];
    pr.textContent = "速度 "+AU.rate.toFixed(2).replace(/0$/,"")+"x";
  });
  if(pl) pl.addEventListener("click", ()=>{ AU.loop=!AU.loop; pl.setAttribute("aria-pressed", AU.loop); });
  if(pq) pq.addEventListener("click", ()=>{ AU.quiz=!AU.quiz; auReset(); render(); });

  /* flashcards */
  document.querySelectorAll("[data-fd]").forEach(b=>{
    b.addEventListener("click", ()=>{ fc.domain=b.dataset.fd; fc.idx=0; fc.flip=false; cz.idx=0; cz.open=false; render(); });
  });
  const card = $("#fcard");
  if(card){
    const flip = ()=>{ fc.flip=!fc.flip; render(); };
    card.addEventListener("click", flip);
    card.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault(); flip();} });
  }
  const list = fcList();
  const move = dir=>{ fc.idx=(fc.idx+dir+list.length)%list.length; fc.flip=false; render(); };
  const fp=$("#fprev"), fn=$("#fnext"), fy=$("#fyes"), fo=$("#fno"), fs=$("#fshuffle"), fu=$("#funknown");
  if(fp) fp.addEventListener("click", ()=>move(-1));
  if(fn) fn.addEventListener("click", ()=>move(1));
  if(fy) fy.addEventListener("click", ()=>{ S.cards[list[fc.idx].t]=1; bump("c"); move(1); });
  if(fo) fo.addEventListener("click", ()=>{ delete S.cards[list[fc.idx].t]; bump("c"); move(1); });
  if(fs) fs.addEventListener("click", ()=>{
    for(let i=CARDS.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [CARDS[i],CARDS[j]]=[CARDS[j],CARDS[i]];}
    fc.idx=0; fc.flip=false; render();
  });
  if(fu) fu.addEventListener("click", ()=>{
    const unknown = CARDS.filter(c=>S.cards[c.t]!==1);
    if(unknown.length){
      CARDS.sort((a,b)=>(S.cards[a.t]===1?1:0)-(S.cards[b.t]===1?1:0));
      fc.idx=0; fc.flip=false; render();
    }
  });
}

/* 起動：IndexedDB側に新しいデータがあれば採用（localStorage消失時の自動復旧） */
(async ()=>{
  const v = await idbGet();
  if(v && (v.ts||0) > (S.ts||0)){
    S = Object.assign(BLANK(), v);
    if(lsOK){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }
    render();
  }
})();

$("#cd").textContent = daysToExam();
render();
</script>
